name: "supermarket-food-rescue"
version: "0.3.0"
entry_point: "env:SupermarketEnv"

tasks:
  - name: "easy"
    description: "Low volume — 5 items, agent must minimise waste"
    grader:
      type: "reward"
      goal: 0.5
  - name: "medium"
    description: "Standard operations — 10 items"
    grader:
      type: "reward"
      goal: 0.7
    default: true
  - name: "hard"
    description: "Holiday rush — 20 items, tighter expiry windows"
    grader:
      type: "reward"
      goal: 0.9